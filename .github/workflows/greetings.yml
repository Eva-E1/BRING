name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Thank you for reporting this. It will be reviewed and fixed quickly. I hope you enjoy the project."
        pr-message: "Thank you for reporting this. It will be reviewed and fixed quickly. I hope you enjoy the project."
